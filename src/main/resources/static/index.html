<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Maven Project UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f6f9;
        }
        .container-box {
            margin-top: 80px;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="container-box text-center">
        <h1 class="mb-4">Welcome to My Project</h1>
        <p class="lead">Your Spring Boot application UI is running successfully 🎉</p>
        
        <hr>

        <div class="mt-4">
            <button class="btn btn-primary" onclick="callBackend()">Test Backend API</button>
        </div>

        <div class="mt-3">
            <p id="response" class="fw-bold text-success"></p>
        </div>
    </div>
</div>

<script>
    function callBackend() {
        fetch('/api/hello')
            .then(response => response.text())
            .then(data => {
                document.getElementById('response').innerText = data;
            })
            .catch(error => {
                document.getElementById('response').innerText = "Error calling API";
            });
    }
</script>

</body>
</html>
